spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  Kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: orderConfirmation:org.microservice.orderservice.service.kafka.OrderConfirmation
server:
  port: 8300

application:
  config:
    customer-url: http://localhost:customer-service/api/v1/customers
    product-url: http://localhost:product-service/api/v1/products
    payment-url: http://localhost:payment-service/api/v1/payments
