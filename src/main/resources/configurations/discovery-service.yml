eureka:
  instance:
    hostname: discovery
  client:
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://discovery:8761/eureka/

spring:
  config:
    fail-fast: true
    retry:
      max-attempts: 10
      initial-interval: 3000
      multiplier: 1.5

server:
  port: 8761