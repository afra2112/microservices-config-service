spring:
  mongodb:
    uri: mongodb://localhost:27017/notifications
  Kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: paymentGroup, orderGroup
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springFramework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
        spring.json.type.mapping: orderConfirmation:org.microservice.notificationservice.kafka.order.OrderConfirmation,paymentConfirmation:org.microservice.notificationservice.kafka.payment.PaymentConfirmation
  mail:
    host: localhost
    port: 1025
    username: 5607
    password: 5607
    properties:
      mail:
        smtp:
          trust: '*'
        auth: true
        starttls:
          enabled: true
        connectiontimeout: 5000
        timeout: 3000
        writetimeout: 5000
server:
  port: 8500