spring:
  datasource:
    url: jdbc:mysql://mysql:3306/products
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    cloud:
      config:
        fail-fast: true
        retry:
          max-attempts: 10
          initial-interval: 3000
          multiplier: 1.5
server:
  port: 8200
