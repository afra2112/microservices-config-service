eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://discovery:8761/eureka

spring:
  cloud:
    config:
      override.system-properties: false
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 3000
        multiplier: 1.5
        
management:
  tracing:
    sampling:
      probability: 1.0 
